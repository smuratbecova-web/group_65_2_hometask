<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Posts</title>
</head>
<body>
    <h1>Posts</h1>

    <a href="{% url 'post_create' %}" style="display: inline-block; padding: 10px; background: green; color: white; text-decoration: none; border-radius: 5px; margin-right: 10px;">
        + Create Post
    </a>
    <a href="{% url 'category_create' %}" style="display: inline-block; padding: 10px; background: blue; color: white; text-decoration: none; border-radius: 5px;">
        + Create Category
    </a>
    <hr>

    {% for post in posts %}
        <p>
            <a href="{% url 'post_detail' post.id %}">
                {{ post.title }}
            </a>
        </p>
    {% endfor %}

    <hr>
    <h2>Categories</h2>
    <ul>
    {% for category in categories %}
        <li>{{ category.title }}</li>
    {% endfor %}
    </ul>
</body>
</html>
